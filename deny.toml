# cargo-deny configuration.
# See https://embarkstudios.github.io/cargo-deny/
#
# Status: advisory-only during pre-release. We treat every check
# as `warn` rather than `deny` because (a) path deps are reported
# as "wildcard", (b) Tauri brings in MPL/Unicode deps that we
# have not vetted individually, and (c) we do not have published
# crates yet so the cost of a transitive CVE blast radius is small.
# Tighten this to `deny` before the first published release.

[graph]
all-features = false

[advisories]
version = 2
yanked = "warn"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
    "MPL-2.0",
    "MIT-0",
]
# warn (not deny) until first published release.
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
# Path deps in a Cargo workspace are reported as "wildcard"
# because their version is implicit (= workspace version). This
# is intentional for monorepos; switch to `deny` only when
# every dep is version-pinned.
wildcards = "allow"
