# flowntier.toml — top-level runtime config for Flowntier.
# See docs/CONFIG.md §3 for the full schema (will be added in v0.4.1).
#
# This file is the **checked-in default**. The desktop Tauri shell
# constructs AcoConfig in code from this file's values at build time;
# runtime overrides live in the user data directory:
#   Windows : %APPDATA%\flowntier\flowntier.toml
#   macOS   : ~/Library/Application Support/flowntier/flowntier.toml
#   Linux   : ~/.config/flowntier/flowntier.toml

[app]
# data_dir is read from the OS-default at runtime; setting it here
# only affects the standalone `flowntier` CLI.
# data_dir    = "%APPDATA%/flowntier"
log_level   = "info"
theme       = "dark"
auto_update = false
telemetry   = false

[workflow]
max_plan_revisions   = 3
max_repair_loops     = 3
max_parallel_workers = 8
max_total_tokens     = 5_000_000
max_wallclock_secs   = 14400
max_user_query_wait  = 3600

[ui]
show_token_stream   = false
show_console        = true
console_height_px   = 240
timeline_position   = "bottom"

[logging]
redact         = ["*KEY*", "*TOKEN*", "*SECRET*", "*PASSWORD*", "*AUTH*"]
format         = "json"
sample_console = 1.0
sample_events  = 0.1

[storage]
retention_usage_days   = 365
retention_prompts_days = 180
backup_dir             = "%APPDATA%/flowntier/backups"
backup_daily_keep      = 7
backup_weekly_keep     = 4

[security]
allow_unrestricted_plugins     = false
confirm_external_writes        = true
require_signature_for_plugins  = true