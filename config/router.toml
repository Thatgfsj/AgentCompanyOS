# router.toml — model routing per role. See docs/PROVIDER_SPEC.md §5.3.
# Format: `provider_id:model_id`. The provider must be enabled in
# providers.toml.

[defaults]
chief      = "anthropic:claude-opus-4-8"
critic_a   = "google:gemini-2-5-pro"
critic_b   = "anthropic:claude-sonnet-4-6"
worker     = "minimax:minimax-m3"
reporter   = "deepseek:deepseek-reasoner"

# Fallback chains. The router tries each in order on retryable errors.
# See docs/PROVIDER_SPEC.md §6.2.

[fallback.chief]
chain = [
  "anthropic:claude-opus-4-8",
  "kimi:kimi-k2",
  "openai:gpt-5",
  "google:gemini-2-5-pro",
]

[fallback.critic_a]
chain = [
  "google:gemini-2-5-pro",
  "anthropic:claude-sonnet-4-6",
  "openai:gpt-5",
]

[fallback.critic_b]
chain = [
  "anthropic:claude-sonnet-4-6",
  "google:gemini-2-5-pro",
  "openai:gpt-5",
]

[fallback.worker]
chain = [
  "minimax:minimax-m3",
  "deepseek:deepseek-chat",
  "openai:gpt-5",
]

[fallback.reporter]
chain = [
  "deepseek:deepseek-reasoner",
  "anthropic:claude-sonnet-4-6",
  "google:gemini-2-5-pro",
]

# Per-task overrides. Unknown task ids are a warning, not an error.
# They apply when the task starts.
[overrides]
# "task_01HZX..." = "openai:gpt-5"
