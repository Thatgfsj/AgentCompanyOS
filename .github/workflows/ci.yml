name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  # ── Rust ──────────────────────────────────────────────────────
  rust:
    name: Rust (cargo test + clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-features

  # ── Python (uv workspace) ────────────────────────────────────
  python:
    name: Python (pytest + ruff + black + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Sync workspace
        run: uv sync --all-extras
      - name: ruff check
        run: uv run --frozen ruff check .
      - name: black --check
        run: uv run --frozen black --check .
      - name: mypy --strict
        run: uv run --frozen mypy runtime apps/runtime
      - name: pytest
        run: uv run --frozen pytest

  # ── TypeScript (pnpm workspace) ──────────────────────────────
  typescript:
    name: TypeScript (vitest + eslint + prettier + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: prettier --check
        run: pnpm -r --parallel format:check
      - name: eslint
        run: pnpm -r --parallel lint
      - name: tsc --noEmit
        run: pnpm -r --parallel typecheck
      - name: vitest
        run: pnpm -r --parallel test

  # ── Markdown (prettier) ──────────────────────────────────────
  markdown:
    name: Markdown (prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g prettier
      - run: prettier --check "**/*.md"

  # ── Secrets scan ─────────────────────────────────────────────
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Dependency audit ─────────────────────────────────────────
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    needs: [rust, python, typescript]
    steps:
      - uses: actions/checkout@v4
      - name: cargo audit
        run: |
          cargo install --locked cargo-audit
          cargo audit
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit
        run: pnpm audit --prod --audit-level=high
